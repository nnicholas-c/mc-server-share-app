name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_DEFAULT_COORDINATOR_URL: https://mc-server-share-app.vercel.app
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: MC Server Share ${{ github.ref_name }}
          releaseBody: |
            Download **MC-Server-Share_${{ github.ref_name }}_x64-setup.exe** below and run it.
            No dev tools required.

            **First time?** See the [Hosting Guide](https://github.com/nnicholas-c/mc-server-share-app/blob/main/docs/hosting-guide.md).
          releaseDraft: false
          prerelease: false
