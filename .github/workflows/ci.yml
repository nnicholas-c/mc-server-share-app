name: CI

on:
  push:
    branches:
      - RLCraft
      - main
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Run JS tests
        run: npm run test

      - name: Run TypeScript checks
        run: npm run typecheck

      - name: Build web apps
        run: npm run build

      - name: Check Tauri backend
        working-directory: apps/desktop/src-tauri
        run: cargo check

      - name: Test Tauri backend
        working-directory: apps/desktop/src-tauri
        run: cargo test
